<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEW EVENT</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
    }

    /* TOP HEADER */
    #header {
      width: 100%;
      text-align: center;
      padding: 18px 0 14px;
      z-index: 10;
      flex-shrink: 0;
    }

    #header span {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.2rem, 7vw, 5rem);
      color: #e00;
      letter-spacing: 0.2em;
      text-shadow:
        0 0 10px rgba(220,0,0,0.9),
        0 0 30px rgba(220,0,0,0.5),
        0 0 60px rgba(220,0,0,0.2);
    }

    /* IMAGE CONTAINER */
    #image-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
    }

    #image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* dark overlay so button is readable */
    #image-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    /* BUTTON */
    #check-btn {
      position: absolute;
      bottom: 8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: #fff;
      background: transparent;
      border: 2px solid #e00;
      padding: 16px 56px;
      cursor: pointer;
      letter-spacing: 0.3em;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 16px rgba(220,0,0,0.4), inset 0 0 16px rgba(220,0,0,0.05);
    }

    #check-btn:hover {
      background: #e00;
      color: #fff;
      box-shadow: 0 0 40px rgba(220,0,0,0.8), inset 0 0 20px rgba(255,0,0,0.2);
    }
  </style>
</head>
<body>

  <div id="header">
    <span>NEW EVENT</span>
  </div>

  <div id="image-wrap">
    <img src="godwifi sketch.png" alt="new event">
    <a id="check-btn"
       href="https://www.instagram.com/p/DVgtqm1iO3D/?utm_source=ig_web_button_share_sheet&igsh=MzRlODBiNWFlZA=="
       target="_blank"
       rel="noopener noreferrer">
      SPRAWDŹ
    </a>
  </div>

</body>
</html>
